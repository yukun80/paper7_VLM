# Small benchmark runtime config for an online frozen Qwen controller.
benchmark_dir: benchmark/multisource_landslide_v1_small
output_dir: outputs/qpsalm_refactor_small_online_qwen
train_index: indexes/instruction_train.jsonl
val_index: indexes/instruction_val.jsonl
test_index: indexes/instruction_test.jsonl
preset: sane_qmef_pmrd
controller: qwen
qwen_model_path: models_zoo/Qwen3-VL-2B-Instruct
allow_qwen_cpu: false
batch_size: 1
num_workers: 4
max_steps: null
num_epochs: 10
val_interval: 1000
save_interval: 5000
visualize_interval: 1000
log_interval: 20
max_val_batches: 0
num_visualizations: 8
max_train_samples: null
max_val_samples: 256
seed: 42
train_hflip_prob: 0.5
train_vflip_prob: 0.5
lr: 0.0001
weight_decay: 0.01
warmup_steps: 500
grad_clip: 1.0
grad_accum_steps: 1
eval_threshold: 0.5
