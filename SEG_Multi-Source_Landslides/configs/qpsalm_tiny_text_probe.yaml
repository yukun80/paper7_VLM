# 开发配置：只定义数据、运行规模和控制器；算法结构由 dev_smoke preset 定义。
benchmark_dir: benchmark/multisource_landslide_v1_small
output_dir: outputs/qpsalm_refactor_smoke
train_index: indexes/instruction_train.jsonl
val_index: indexes/instruction_val.jsonl
test_index: indexes/instruction_test.jsonl
preset: dev_smoke
controller: text_probe
qwen_model_path: models_zoo/Qwen3-VL-2B-Instruct
batch_size: 1
num_workers: 0
max_steps: 5
val_interval: 5
save_interval: 5
visualize_interval: 5
log_interval: 5
max_val_batches: 0
num_visualizations: 4
max_train_samples: 32
