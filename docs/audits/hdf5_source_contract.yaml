schema_version: sami_hdf5_source_contract_v1
protocol: sami_hdf5_materialized_copy_v1
status: frozen_for_p1_implementation
source_path_namespace: datasets
benchmark_path_namespace: benchmark
hash_algorithm: sha256
canonical_identity:
  allowed_path_prefixes:
    - datasets/
    - benchmark/sami_landslide_hdf5_v4/small/
  allow_absolute_paths: false
  fields:
    - source_key
    - source_sample_id
    - image.source_logical_path
    - image.benchmark_logical_path
    - image.sha256
    - image.size_bytes
    - image.dataset_key
    - image.shape
    - image.dtype
    - image.layout
    - mask.source_logical_path
    - mask.benchmark_logical_path
    - mask.sha256
    - mask.size_bytes
    - mask.dataset_key
    - mask.shape
    - mask.dtype
    - channels
    - validity
    - source_declared_split
    - canonical_split
    - split_assurance
    - evaluation_eligibility
  excluded_fields:
    - runtime_resolved_path
    - conversion_host_path
    - file_mtime
    - audit_timestamp

enums:
  ingestion_status:
    - ready
    - not_ready
  canonical_split:
    - train
    - val
    - test
  split_assurance:
    - verified_group_isolated
    - source_declared_unverified
    - train_only
  evaluation_eligibility:
    - strict
    - exploratory
    - train_only
  group_kind:
    - scene
    - event
    - location
    - source_sample
    - unknown
  group_completeness:
    - verified
    - partial
    - unavailable
  modality_family:
    - optical
    - multispectral
    - dem
    - slope
    - sar
    - insar
    - other

state_rules:
  - when:
      ingestion_status: not_ready
    require:
      canonical_record_count: 0
  - when:
      split_assurance: verified_group_isolated
    require:
      evaluation_eligibility: strict
  - when:
      split_assurance: source_declared_unverified
    require:
      evaluation_eligibility: exploratory
  - when:
      split_assurance: train_only
    require:
      canonical_split: train
      evaluation_eligibility: train_only
  - rule: missing_group_location_or_duplicate_evidence_does_not_block_training
  - rule: source_declared_splits_are_not_randomly_rewritten
  - rule: strict_exploratory_and_train_only_aggregates_are_disjoint

source_record:
  required:
    - schema_version
    - source_key
    - source_sample_id
    - ingestion_status
    - source_declared_split
    - canonical_split
    - split_assurance
    - evaluation_eligibility
    - group
    - duplicate_component
    - image
    - mask
    - channels
    - validity
    - record_sha256
  fields:
    schema_version:
      const: sami_hdf5_source_record_v1
    source_key:
      type: string
    source_sample_id:
      type: string
    ingestion_status:
      enum_ref: ingestion_status
    source_declared_split:
      type:
        - string
        - "null"
      allowed_strings:
        - train
        - val
        - test
    canonical_split:
      enum_ref: canonical_split
    split_assurance:
      enum_ref: split_assurance
    evaluation_eligibility:
      enum_ref: evaluation_eligibility
    group:
      required:
        - group_id
        - group_kind
        - evidence
        - completeness
      fields:
        group_id:
          type:
            - string
            - "null"
        group_kind:
          enum_ref: group_kind
        evidence:
          type: array
          items: string
        completeness:
          enum_ref: group_completeness
    duplicate_component:
      required:
        - component_id
        - evidence_level
      fields:
        component_id:
          type:
            - string
            - "null"
        evidence_level:
          enum:
            - verified
            - candidate
            - unavailable
    image:
      required:
        - source_logical_path
        - benchmark_logical_path
        - sha256
        - size_bytes
        - dataset_key
        - shape
        - dtype
        - layout
      fields:
        source_logical_path:
          pattern: "^datasets/.+\\.h5$"
        benchmark_logical_path:
          pattern: "^benchmark/sami_landslide_hdf5_v4/small/assets/.+\\.h5$"
        sha256:
          pattern: "^[0-9a-f]{64}$"
        size_bytes:
          type: integer
          minimum: 1
        dataset_key:
          const: /image
        shape:
          type: array
          min_items: 3
          max_items: 3
        dtype:
          type: string
        layout:
          const: CHW
    mask:
      required:
        - source_logical_path
        - benchmark_logical_path
        - sha256
        - size_bytes
        - dataset_key
        - shape
        - dtype
        - value_semantics
      fields:
        source_logical_path:
          pattern: "^datasets/.+\\.h5$"
        benchmark_logical_path:
          pattern: "^benchmark/sami_landslide_hdf5_v4/small/assets/.+\\.h5$"
        sha256:
          pattern: "^[0-9a-f]{64}$"
        size_bytes:
          type: integer
          minimum: 1
        dataset_key:
          const: /mask
        shape:
          type: array
          min_items: 2
          max_items: 2
        dtype:
          const: uint8
        value_semantics:
          const:
            0: background
            1: landslide
    channels:
      type: array
      min_items: 1
      item_required:
        - index
        - channel_key
        - display_name
        - modality_family
        - physical_unit
        - wavelength_nm
        - wavelength_known
        - gsd_m
        - gsd_known
        - normalization
        - validity_source
      item_fields:
        index:
          type: integer
          minimum: 0
        channel_key:
          type: string
        display_name:
          type: string
        modality_family:
          enum_ref: modality_family
        physical_unit:
          type:
            - string
            - "null"
        wavelength_nm:
          type:
            - number
            - "null"
        wavelength_known:
          type: boolean
        gsd_m:
          type:
            - number
            - "null"
        gsd_known:
          type: boolean
        normalization:
          enum:
            - none
            - divide_255
            - zscore_valid_pixels
            - source_preprocessed
        validity_source:
          enum:
            - channel_valid
            - pixel_valid
            - valid_mask
            - implicit_present
      invariants:
        - wavelength_known_false_requires_wavelength_nm_null
        - wavelength_known_true_requires_positive_wavelength_nm
        - gsd_known_false_requires_gsd_m_null
        - gsd_known_true_requires_positive_gsd_m
        - non_spectral_modalities_never_receive_wavelength
    validity:
      required:
        - valid_mask_key
        - valid_mask_owner
        - pixel_valid_key
        - pixel_valid_owner
        - channel_valid_key
        - channel_valid_owner
        - label_valid_semantics
        - input_pixel_valid_derivation
      fields:
        valid_mask_key:
          type:
            - string
            - "null"
        valid_mask_owner:
          enum:
            - image_hdf5
            - mask_hdf5
            - absent
        pixel_valid_key:
          type:
            - string
            - "null"
        pixel_valid_owner:
          enum:
            - image_hdf5
            - mask_hdf5
            - absent
        channel_valid_key:
          type:
            - string
            - "null"
        channel_valid_owner:
          enum:
            - image_hdf5
            - mask_hdf5
            - absent
        label_valid_semantics:
          type: string
        input_pixel_valid_derivation:
          enum:
            - read_per_channel_pixel_valid
            - broadcast_label_valid_to_present_channels
            - broadcast_present_channels_over_full_grid
        notes:
          type: array
          items: string
    provenance:
      allowed_fields:
        - source_name
        - source_document
        - citation_key
        - upstream_url
        - provenance_notes
    record_sha256:
      pattern: "^[0-9a-f]{64}$"

canonical_parent_binding:
  schema_version: sami_canonical_parent_v4
  required:
    - parent_id
    - source_key
    - source_sample_id
    - canonical_split
    - split_assurance
    - evaluation_eligibility
    - source_record_sha256
    - channels
    - image_ref
    - mask_ref
    - validity_ref
    - registered_views
    - group
  invariants:
    - parent_id_is_not_claimed_as_verified_location_or_scene
    - source_record_hash_change_invalidates_parent
    - source_or_materialized_image_or_mask_byte_change_invalidates_benchmark
    - downstream_loading_uses_only_benchmark_logical_path
    - source_and_benchmark_copy_sha256_must_match
    - train_only_never_enters_val_or_test
    - not_ready_source_produces_no_parent

registered_rgb_view:
  schema_version: sami_registered_rgb_view_v1
  required:
    - view_id
    - role
    - source_indices
    - channel_keys
    - normalization_binding
    - mapping_evidence
  invariants:
    - role_is_rgb
    - source_indices_are_exactly_three_unique_in_range_values
    - channel_keys_are_ordered_red_green_blue
    - values_and_validity_use_the_same_channel_selection
    - visualization_percentile_stretch_is_forbidden_as_model_normalization

model_input:
  required:
    - parent_id
    - source_key
    - split_assurance
    - evaluation_eligibility
    - channel_values
    - channel_descriptors
    - channel_valid
    - pixel_valid
    - target
    - target_valid
  invariants:
    - source_specific_channel_count_is_preserved
    - fixed_slot_concatenation_is_forbidden
    - invalid_channels_do_not_enter_model
    - loss_and_metrics_consume_target_valid
    - normalization_uses_train_valid_pixels_only
    - source_key_is_not_a_model_feature
    - channel_order_permutation_preserves_eval_logits

source_policies:
  gdcld:
    ingestion_status: ready
    split_policy: preserve_source_train_val_test
    split_assurance: source_declared_unverified
    evaluation_eligibility: exploratory
  lmhld:
    ingestion_status: ready
    split_policy: preserve_source_train_val_test
    split_assurance: source_declared_unverified
    evaluation_eligibility: exploratory
    required_channels:
      - Blue
      - Green
      - Red
      - NIR
  landslidebench_agent:
    ingestion_status: ready
    split_policy: preserve_source_train_val_test_and_report_location_conflicts
    split_assurance: source_declared_unverified
    evaluation_eligibility: exploratory
    channel_valid_key: /channel_valid
    text_status: unverified_provenance_or_auto_candidate_only
  landslide4sense:
    ingestion_status: ready
    split_policy: all_train_only
    split_assurance: train_only
    evaluation_eligibility: train_only
  multimodal_landslide:
    ingestion_status: ready
    split_policy: preserve_source_train_val
    split_assurance: source_declared_unverified
    evaluation_eligibility: exploratory
    required_modalities:
      - RGB
      - DEM
      - InSAR
  sen12_landslides:
    ingestion_status: not_ready
    split_policy: excluded_until_new_audit
