hypotheses:
  - hypothesis_id: H1
    statement: Explicit channel identity and masked set aggregation are sufficient for variable channel combinations.
    status: proposed
    gate_status: blocked_by_prerequisite
    prerequisite: P1_and_P2_owner_acceptance
  - hypothesis_id: H2
    statement: Source-balanced sampling and channel or modality dropout reduce dominant-source collapse.
    status: proposed
    gate_status: blocked_by_prerequisite
    prerequisite: K1_implementation_ready
  - hypothesis_id: H3
    statement: GSD conditioning helps only where reliable physical scale exists.
    status: proposed
    gate_status: blocked_by_prerequisite
    prerequisite: verified_gsd_cohort
  - hypothesis_id: H4
    statement: Prompt conditioning helps only where prompt text changes target information.
    status: proposed
    gate_status: blocked_by_prerequisite
    prerequisite: K1_gate_and_prompt_information_audit
  - hypothesis_id: H5
    statement: Zero or one learned fusion layer is sufficient relative to deeper fusion.
    status: proposed
    gate_status: blocked_by_prerequisite
    prerequisite: reproducible_masked_mean_failure
  - hypothesis_id: H6
    statement: Heterogeneous non-RGB channels are more reliable through a channel-set encoder than an RGB VLM path.
    status: proposed
    gate_status: blocked_by_prerequisite
    prerequisite: P1_and_P2_owner_acceptance

