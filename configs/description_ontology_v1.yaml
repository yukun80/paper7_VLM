version: description_ontology_v1
language: en
unknown_value: unknown
unavailable_value: unavailable

fields:
  target_status:
    kind: categorical
    values: [present, absent, uncertain]
    source: annotation_or_region_prompt
    metric: macro_f1
  location:
    kind: categorical
    values: [upper_left, upper_center, upper_right, center_left, center, center_right, lower_left, lower_center, lower_right, distributed, unknown, unavailable]
    source: deterministic_geometry_or_visual_observation
    metric: categorical_f1_by_provenance
  size_class:
    kind: categorical
    values: [tiny, small, medium, large, extensive, unknown, unavailable]
    source: deterministic_geometry
    metric: categorical_f1
    valid_area_ratio_thresholds:
      tiny: [0.0, 0.001]
      small: [0.001, 0.01]
      medium: [0.01, 0.05]
      large: [0.05, 0.2]
      extensive: [0.2, 1.0]
  shape:
    kind: categorical
    values: [compact, elongated, branching, fragmented, irregular, unknown, unavailable]
    source: deterministic_geometry_or_visual_observation
    metric: categorical_f1_by_provenance
  elongation:
    kind: categorical
    values: [low, moderate, high, unknown, unavailable]
    source: deterministic_geometry
    metric: categorical_f1
    major_minor_ratio_thresholds:
      low: [1.0, 1.5]
      moderate: [1.5, 3.0]
      high: [3.0, null]
  compactness:
    kind: categorical
    values: [compact, moderate, dispersed, unknown, unavailable]
    source: deterministic_geometry
    metric: categorical_f1
  fragmentation:
    kind: categorical
    values: [single, few_components, many_components, highly_fragmented, unknown, unavailable]
    source: deterministic_geometry
    metric: categorical_f1
  surface_observation:
    kind: open_text
    values: [unknown, unavailable]
    source: optical_or_multispectral_visual_evidence
    metric: expert_factuality
  terrain_support:
    kind: categorical
    values: [supports, does_not_support, insufficient_evidence, unknown, unavailable]
    source: terrain_evidence
    metric: categorical_f1_and_ufcr
  sar_support:
    kind: categorical
    values: [supports, does_not_support, insufficient_evidence, unknown, unavailable]
    source: sar_evidence
    metric: categorical_f1_and_ufcr
  deformation_support:
    kind: categorical
    values: [supports, does_not_support, insufficient_evidence, unknown, unavailable]
    source: deformation_evidence
    metric: categorical_f1_and_ufcr
  surrounding_context:
    kind: open_text
    values: [unknown, unavailable]
    source: context_ring_visual_evidence
    metric: expert_factuality
  evidence_sufficiency:
    kind: categorical
    values: [sufficient, partial, insufficient, unavailable]
    source: modality_metadata_and_region_coverage
    metric: categorical_f1
  confidence:
    kind: continuous
    range: [0.0, 1.0]
    source: model
    metric: calibration_error

registered_synonyms:
  centre: center
  no_evidence: insufficient_evidence
  not_available: unavailable
  very_small: tiny
  widespread: extensive

