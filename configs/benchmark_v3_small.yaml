schema_version: sami_benchmark_audit_config_v3
benchmark_name: SAMI Landslide Grounded Benchmark v3
mode: small
seed: 42
benchmark_relative_path: sami_landslide_v3/small
datasets_root:
  env: PAPER7_DATASETS_ROOT
  relative_to: repository_parent
  default: datasets
benchmark_root:
  env: PAPER7_BENCHMARK_ROOT
  relative_to: repository_parent
  default: benchmark
audit:
  hash_algorithm: sha256
  include_hidden: false
  follow_symlinks: false
build:
  materialization:
    canvas_hw: [512, 512]
    resize_policy: fit_inside_then_symmetric_zero_pad
    image_interpolation: bilinear_half_pixel_center
    mask_valid_interpolation: nearest
    image_dtype: float32
    mask_valid_dtype: uint8
  split: {train: 0.7, val: 0.15, test: 0.15}
  duplicates:
    dhash_candidate_max_distance: 8
    verified_rgb64_mae_threshold: 3.0
    normalized_rgb_hw: [64, 64]
  description_subset:
    mmrs_caption_sources: [rsicd, ucm, sydney, nwpu, rsitmd]
    include_dior_rsvg_short_phrase_only: true
    include_rsicap: true
    rsieval_policy: permanent_test_only
    excluded_mmrs_tasks: [total, classification, detection, vqa, infrared, unrelated_sar]
  small_max_parents_per_source: 128
sources:
  - source_key: gdcld
    display_name: GDCLD
    local_path: GDCLD
    enabled: true
    allowed_task_roles: [inventory]
    license:
      source_key: gdcld
      license_status: unknown
      license_name: unknown
      license_url_or_document: null
      allowed_for_training: false
      allowed_for_evaluation: false
      allowed_for_redistribution: false
      academic_only: false
      attribution: Pending source and license review; no use authorized.
      reviewed_by: null
      review_date: null
  - source_key: lmhld
    display_name: LMHLD
    local_path: LMHLD
    enabled: true
    allowed_task_roles: [inventory]
    license:
