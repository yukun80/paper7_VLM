      license_status: unknown
      license_name: unknown
      license_url_or_document: null
      allowed_for_training: false
      allowed_for_evaluation: false
      allowed_for_redistribution: false
      academic_only: false
      attribution: Pending source and license review; no use authorized.
      reviewed_by: null
      review_date: null
  - source_key: sen12_landslides
    display_name: Sen12Landslides
    local_path: Sen12Landslides
    enabled: true
    allowed_task_roles: [inventory, t1, t2]
    license:
