active_profile: S
pixel_budgets:
  - profile: S
    reference_max_pixels: 262144
    support_max_pixels: 147456
    max_views: 4
  - profile: M
    reference_max_pixels: 589824
    support_max_pixels: 200704
    max_views: 6
