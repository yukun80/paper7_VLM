  family: Qwen3-VL-2B
  model_path: models_zoo/Qwen3-VL-2B-Instruct
  local_files_only: true
  trust_remote_code: false
  dtype: bfloat16
  attention_implementation: sdpa
  frozen_vision_tower: true
processor:
  use_official_chat_template: true
  processor_min_pixels: 1024
  patch_size: 16
  spatial_merge_size: 2
  prompt_version: sami_sensor_cards_v1_task_neutral
