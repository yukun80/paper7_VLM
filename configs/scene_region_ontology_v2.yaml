schema_version: sami_scene_region_ontology_v2
fields:
  vegetation:
    kind: scene_context
    allowed_values: [present, absent, uncertain]
    synonyms: [vegetated_area, plant_cover]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [global, region]
    forbidden_without_metadata: []
    evaluation_metric: macro_f1
  water_system:
    kind: scene_context
    allowed_values: [present, absent, uncertain]
    synonyms: [river, stream, water_body]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [global, region]
    forbidden_without_metadata: []
    evaluation_metric: macro_f1
  farmland:
    kind: scene_context
    allowed_values: [present, absent, uncertain]
    synonyms: [cropland, agricultural_land]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [global, region]
    forbidden_without_metadata: []
    evaluation_metric: macro_f1
  bare_soil:
    kind: scene_context
    allowed_values: [present, absent, uncertain]
    synonyms: [bare_ground, exposed_soil]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [global, region]
    forbidden_without_metadata: []
    evaluation_metric: macro_f1
  exposed_rock:
    kind: scene_context
    allowed_values: [present, absent, uncertain]
    synonyms: [rock_outcrop, exposed_bedrock]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [global, region]
    forbidden_without_metadata: []
    evaluation_metric: macro_f1
  road:
    kind: infrastructure_context
    allowed_values: [present, absent, uncertain]
    synonyms: [roadway]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [global, region]
    forbidden_without_metadata: []
    evaluation_metric: macro_f1
  railway:
    kind: infrastructure_context
    allowed_values: [present, absent, uncertain]
    synonyms: [rail_line, railroad]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [global, region]
    forbidden_without_metadata: []
    evaluation_metric: macro_f1
  bridge:
    kind: infrastructure_context
    allowed_values: [present, absent, uncertain]
    synonyms: [crossing_structure]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [global, region]
    forbidden_without_metadata: []
    evaluation_metric: macro_f1
  building:
    kind: built_environment
    allowed_values: [present, absent, uncertain]
    synonyms: [structure]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [global, region]
    forbidden_without_metadata: []
    evaluation_metric: macro_f1
  settlement:
    kind: built_environment
    allowed_values: [present, absent, uncertain]
    synonyms: [residential_area, community]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [global, region]
    forbidden_without_metadata: []
    evaluation_metric: macro_f1
  valley:
    kind: terrain_context
    allowed_values: [present, absent, uncertain]
    synonyms: [valley_floor]
    direct_observation_or_inference: inference
    permitted_source_views: [global, region, dem, slope]
    forbidden_without_metadata: [requires_topographic_support_for_assertion]
    evaluation_metric: supported_field_accuracy
  channel:
    kind: terrain_context
    allowed_values: [present, absent, uncertain]
    synonyms: [drainage_channel, gully]
    direct_observation_or_inference: inference
    permitted_source_views: [global, region, dem, slope]
    forbidden_without_metadata: [requires_topographic_support_for_assertion]
    evaluation_metric: supported_field_accuracy
  ridge:
    kind: terrain_context
    allowed_values: [present, absent, uncertain]
    synonyms: [ridgeline]
    direct_observation_or_inference: inference
    permitted_source_views: [global, region, dem, slope]
    forbidden_without_metadata: [requires_topographic_support_for_assertion]
    evaluation_metric: supported_field_accuracy
  slope_position:
    kind: terrain_relation
    allowed_values: [upper, middle, lower, toe, uncertain]
    synonyms: [hillslope_position]
    direct_observation_or_inference: inference
    permitted_source_views: [region, dem, slope]
    forbidden_without_metadata: [requires_topographic_support]
    evaluation_metric: supported_field_accuracy
  target_location:
    kind: region_geometry
    allowed_values: [upper_left, upper, upper_right, left, center, right, lower_left, lower, lower_right, uncertain]
    synonyms: [image_location, region_location]
    direct_observation_or_inference: deterministic_geometry
    permitted_source_views: [exact_mask]
    forbidden_without_metadata: [requires_reference_canvas]
    evaluation_metric: exact_match
  target_shape:
    kind: region_geometry
    allowed_values: [compact, elongated, branching, fragmented, irregular, uncertain]
    synonyms: [region_shape, mask_shape]
    direct_observation_or_inference: deterministic_geometry
    permitted_source_views: [exact_mask]
    forbidden_without_metadata: [requires_exact_mask]
    evaluation_metric: macro_f1
  boundary_clarity:
    kind: region_appearance
    allowed_values: [clear, mixed, diffuse, uncertain]
    synonyms: [edge_clarity, boundary_definition]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [region, exact_mask]
    forbidden_without_metadata: []
    evaluation_metric: supported_field_accuracy
  surface_disturbance:
    kind: region_appearance
    allowed_values: [present, absent, uncertain]
    synonyms: [surface_disruption, disturbed_surface]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [region, optical, multispectral, sar]
    forbidden_without_metadata: []
    evaluation_metric: supported_field_accuracy
  vegetation_disturbance:
    kind: region_appearance
    allowed_values: [present, absent, uncertain]
    synonyms: [vegetation_loss, disrupted_vegetation]
    direct_observation_or_inference: inference
    permitted_source_views: [region, optical, multispectral]
    forbidden_without_metadata: [requires_vegetation_visible]
    evaluation_metric: supported_field_accuracy
  internal_texture:
    kind: region_appearance
    allowed_values: [smooth, heterogeneous, coarse, striped, uncertain]
    synonyms: [region_texture]
    direct_observation_or_inference: direct_observation
    permitted_source_views: [region, optical, multispectral, sar]
    forbidden_without_metadata: []
    evaluation_metric: supported_field_accuracy
  relation_to_river:
    kind: spatial_relation
    allowed_values: [intersects, adjacent, near, distant, absent, uncertain]
    synonyms: [river_proximity, stream_relation]
    direct_observation_or_inference: deterministic_geometry
    permitted_source_views: [global, region, exact_mask]
    forbidden_without_metadata: [requires_visible_or_registered_water_system]
    evaluation_metric: supported_field_accuracy
  relation_to_road:
    kind: spatial_relation
    allowed_values: [intersects, adjacent, near, distant, absent, uncertain]
    synonyms: [road_proximity]
    direct_observation_or_inference: deterministic_geometry
    permitted_source_views: [global, region, exact_mask]
    forbidden_without_metadata: [requires_visible_or_registered_road]
    evaluation_metric: supported_field_accuracy
  relation_to_settlement:
    kind: spatial_relation
    allowed_values: [intersects, adjacent, near, distant, absent, uncertain]
    synonyms: [settlement_proximity]
    direct_observation_or_inference: deterministic_geometry
    permitted_source_views: [global, region, exact_mask]
    forbidden_without_metadata: [requires_visible_or_registered_settlement]
    evaluation_metric: supported_field_accuracy
  alternative_explanation:
    kind: evidence_assessment
    allowed_values: [none_visible, construction, river_sediment, bare_soil, cloud_or_shadow, sensor_artifact, other, uncertain]
    synonyms: [competing_explanation, confounder]
    direct_observation_or_inference: inference
    permitted_source_views: [global, region, active_modalities]
    forbidden_without_metadata: [must_not_assert_causality]
    evaluation_metric: unsupported_claim_rate
  evidence_limitation:
    kind: evidence_assessment
    allowed_values: [none, missing_modality, invalid_coverage, weak_alignment, insufficient_resolution, ambiguous_appearance, missing_physical_metadata]
    synonyms: [uncertainty_reason, evidence_gap]
    direct_observation_or_inference: evidence_state
    permitted_source_views: [active_modalities, valid_masks, metadata]
    forbidden_without_metadata: []
    evaluation_metric: evidence_state_accuracy
