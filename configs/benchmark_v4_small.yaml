schema_version: sami_benchmark_v4_config_v1
protocol: sami_hdf5_materialized_copy_v1
benchmark_name: SAMI Landslide HDF5 Benchmark v4
mode: small
benchmark_relative_path: sami_landslide_hdf5_v4/small
source_contract_path: docs/audits/hdf5_source_contract.yaml
source_inventory_path: docs/audits/hdf5_source_inventory.json
sources:
  - source_key: gdcld
    ingestion_status: ready
    source_root: datasets/GDCLD
    hdf5_base: datasets/GDCLD
    indexes:
      - logical_path: datasets/GDCLD/jsonl/sample_index_train.jsonl
        source_declared_split: train
        canonical_split: train
      - logical_path: datasets/GDCLD/jsonl/sample_index_val.jsonl
        source_declared_split: val
        canonical_split: val
      - logical_path: datasets/GDCLD/jsonl/sample_index_test.jsonl
        source_declared_split: test
        canonical_split: test
    sample_id_field: sample_key
    image_path_field: image_hdf5
    mask_path_field: mask_hdf5
    row_split_field: split
    split_assurance: source_declared_unverified
    evaluation_eligibility: exploratory
    group_field: scene
    group_kind: scene
    group_completeness: partial
    group_evidence:
      - source_index.scene
    duplicate_component_field: null
    duplicate_evidence_level: unavailable
    validity:
      valid_mask_key: /valid_mask
      valid_mask_owner: mask_hdf5
      pixel_valid_key: null
      pixel_valid_owner: absent
      channel_valid_key: /channel_valid
      channel_valid_owner: image_hdf5
      label_valid_semantics: nonzero pixels are valid label and non-padding support
      input_pixel_valid_derivation: broadcast_label_valid_to_present_channels
      notes:
        - image values and label validity remain separate bindings
    provenance:
      source_name: GDCLD
      source_document: datasets/GDCLD/hdf5/channel_schema.json
      citation_key: gdcld
      upstream_url: null
      provenance_notes: Native source split retained without verified group isolation.
    risks:
      - native split group isolation not independently replayed
      - source metadata contains machine absolute paths
    known_location_cross_split_conflict_count: null

  - source_key: landslide4sense
    ingestion_status: ready
    source_root: datasets/landslide4sense
    hdf5_base: datasets/landslide4sense/hdf5
    indexes:
      - logical_path: datasets/landslide4sense/hdf5/conversion_manifest.jsonl
        source_declared_split: null
        canonical_split: train
    sample_id_field: sample_key
    image_path_field: image_hdf5
    mask_path_field: mask_hdf5
    row_split_field: null
    split_assurance: train_only
    evaluation_eligibility: train_only
    group_field: null
    group_kind: unknown
    group_completeness: unavailable
    group_evidence: []
    duplicate_component_field: null
    duplicate_evidence_level: unavailable
    validity:
      valid_mask_key: null
      valid_mask_owner: absent
      pixel_valid_key: null
      pixel_valid_owner: absent
      channel_valid_key: /channel_valid
      channel_valid_owner: image_hdf5
      label_valid_semantics: full mask grid is label-valid
      input_pixel_valid_derivation: broadcast_present_channels_over_full_grid
      notes:
        - an all-zero but present slope channel remains a valid observation
    provenance:
      source_name: Landslide4Sense
      source_document: datasets/landslide4sense/hdf5/channel_schema.json
      citation_key: landslide4sense
      upstream_url: null
      provenance_notes: All positive and background rows enter canonical train only.
    risks:
      - no trustworthy canonical val or test index
      - 114 all-zero slope channels
      - per-sample location and group unavailable
      - source metadata contains machine absolute paths
    known_location_cross_split_conflict_count: null

  - source_key: landslidebench_agent
    ingestion_status: ready
    source_root: datasets/LandslideBench_agent
    hdf5_base: datasets/LandslideBench_agent
    indexes:
      - logical_path: datasets/LandslideBench_agent/jsonl/sample_index_train.jsonl
        source_declared_split: train
        canonical_split: train
      - logical_path: datasets/LandslideBench_agent/jsonl/sample_index_val.jsonl
        source_declared_split: val
        canonical_split: val
      - logical_path: datasets/LandslideBench_agent/jsonl/sample_index_test.jsonl
        source_declared_split: test
        canonical_split: test
    sample_id_field: sample_key
    image_path_field: image_hdf5
    mask_path_field: mask_hdf5
    row_split_field: split
    split_assurance: source_declared_unverified
    evaluation_eligibility: exploratory
    group_field: location_key
    group_kind: location
    group_completeness: partial
    group_evidence:
      - source_index.location_key
    duplicate_component_field: null
    duplicate_evidence_level: unavailable
    validity:
      valid_mask_key: null
      valid_mask_owner: absent
      pixel_valid_key: null
      pixel_valid_owner: absent
      channel_valid_key: /channel_valid
      channel_valid_owner: image_hdf5
      label_valid_semantics: full mask grid is label-valid
      input_pixel_valid_derivation: broadcast_present_channels_over_full_grid
      notes:
        - dialogue text is excluded from canonical supervision and identity
    provenance:
      source_name: LandslideBench_agent
      source_document: datasets/LandslideBench_agent/hdf5/channel_schema.json
      citation_key: landslidebench_agent
      upstream_url: null
      provenance_notes: Location conflicts are reported; dialogue is unverified provenance only.
    risks:
      - 311 location-level cross-split conflicts
      - dialogue text is not factual or expert truth
    known_location_cross_split_conflict_count: 311

  - source_key: lmhld
    ingestion_status: ready
    source_root: datasets/LMHLD
    hdf5_base: datasets/LMHLD
    indexes:
      - logical_path: datasets/LMHLD/jsonl/sample_index_train.jsonl
        source_declared_split: train
        canonical_split: train
      - logical_path: datasets/LMHLD/jsonl/sample_index_val.jsonl
        source_declared_split: val
        canonical_split: val
      - logical_path: datasets/LMHLD/jsonl/sample_index_test.jsonl
        source_declared_split: test
        canonical_split: test
    sample_id_field: sample_key
    image_path_field: image_hdf5
    mask_path_field: mask_hdf5
    row_split_field: split
    split_assurance: source_declared_unverified
    evaluation_eligibility: exploratory
    group_field: null
    group_kind: unknown
    group_completeness: unavailable
    group_evidence: []
    duplicate_component_field: null
    duplicate_evidence_level: unavailable
    validity:
      valid_mask_key: null
      valid_mask_owner: absent
      pixel_valid_key: null
      pixel_valid_owner: absent
      channel_valid_key: /channel_valid
      channel_valid_owner: image_hdf5
      label_valid_semantics: full mask grid is label-valid
      input_pixel_valid_derivation: broadcast_present_channels_over_full_grid
      notes:
        - mixed dataset-level resolution range is not a per-sample GSD
    provenance:
      source_name: LMHLD
      source_document: datasets/LMHLD/hdf5/channel_schema.json
      citation_key: lmhld
      upstream_url: null
      provenance_notes: B/G/R/NIR are retained; missing group evidence lowers evaluation assurance only.
    risks:
      - per-sample sensor, location, CRS, date, unit, parent, and group unavailable
      - 177 zero masks
      - 39 full-one masks
      - 18100 masks below 10 percent coverage
      - source metadata contains machine absolute paths
    known_location_cross_split_conflict_count: null

  - source_key: multimodal_landslide
    ingestion_status: ready
    source_root: datasets/multimodal-landslide-dataset
    hdf5_base: datasets/multimodal-landslide-dataset
    indexes:
      - logical_path: datasets/multimodal-landslide-dataset/jsonl/sample_index_train.jsonl
        source_declared_split: train
        canonical_split: train
      - logical_path: datasets/multimodal-landslide-dataset/jsonl/sample_index_val.jsonl
        source_declared_split: val
        canonical_split: val
    sample_id_field: sample_key
    image_path_field: image_hdf5
    mask_path_field: mask_hdf5
    row_split_field: split
    split_assurance: source_declared_unverified
    evaluation_eligibility: exploratory
    group_field: null
    group_kind: unknown
    group_completeness: unavailable
    group_evidence: []
    duplicate_component_field: null
    duplicate_evidence_level: unavailable
    validity:
      valid_mask_key: /valid_mask
      valid_mask_owner: mask_hdf5
      pixel_valid_key: /pixel_valid
      pixel_valid_owner: image_hdf5
      channel_valid_key: /channel_valid
      channel_valid_owner: image_hdf5
      label_valid_semantics: nonzero valid_mask pixels are label-valid
      input_pixel_valid_derivation: read_per_channel_pixel_valid
      notes:
