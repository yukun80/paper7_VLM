      source_name: Multimodal landslide dataset
      source_document: datasets/multimodal-landslide-dataset/hdf5/channel_schema.json
      citation_key: multimodal_landslide
      upstream_url: null
      provenance_notes: RGB DEM and InSAR are retained with native train/val and exploratory assurance.
    risks:
