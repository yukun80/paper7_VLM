schema_version: sami_benchmark_audit_config_v3
benchmark_name: SAMI Landslide Grounded Benchmark v3
mode: full
seed: 42
benchmark_relative_path: sami_landslide_v3/full
datasets_root:
  env: PAPER7_DATASETS_ROOT
  relative_to: repository_parent
  default: datasets
benchmark_root:
  env: PAPER7_BENCHMARK_ROOT
  relative_to: repository_parent
  default: benchmark
audit:
  hash_algorithm: sha256
  include_hidden: false
  follow_symlinks: false
build:
  materialization:
    canvas_hw: [512, 512]
    resize_policy: fit_inside_then_symmetric_zero_pad
    image_interpolation: bilinear_half_pixel_center
    mask_valid_interpolation: nearest
    image_dtype: float32
    mask_valid_dtype: uint8
  split: {train: 0.7, val: 0.15, test: 0.15}
  duplicates:
    dhash_candidate_max_distance: 8
    verified_rgb64_mae_threshold: 3.0
    normalized_rgb_hw: [64, 64]
  description_subset:
    mmrs_caption_sources: [rsicd, ucm, sydney, nwpu, rsitmd]
    include_dior_rsvg_short_phrase_only: true
    include_rsicap: true
    rsieval_policy: permanent_test_only
    excluded_mmrs_tasks: [total, classification, detection, vqa, infrared, unrelated_sar]
  small_max_parents_per_source: 4096
sources:
  - source_key: gdcld
    enabled: true
    task_roles: [inventory]
    provenance: {source_key: gdcld, source_name: GDCLD, source_root: datasets/GDCLD, source_document: null, citation_key: gdcld, upstream_url: null, provenance_notes: local research copy provided by project owner}
  - source_key: lmhld
    enabled: true
    task_roles: [inventory]
    provenance: {source_key: lmhld, source_name: LMHLD, source_root: datasets/LMHLD, source_document: null, citation_key: lmhld, upstream_url: null, provenance_notes: local research copy provided by project owner}
  - source_key: sen12_landslides
    enabled: true
    task_roles: [inventory, t1, t2]
    provenance: {source_key: sen12_landslides, source_name: Sen12Landslides, source_root: datasets/Sen12Landslides, source_document: datasets/Sen12Landslides/README.md, citation_key: sen12_landslides, upstream_url: null, provenance_notes: local research copy provided by project owner}
  - source_key: landslide4sense
    enabled: true
    task_roles: [inventory]
    provenance: {source_key: landslide4sense, source_name: Landslide4Sense, source_root: datasets/landslide4sense, source_document: null, citation_key: landslide4sense, upstream_url: null, provenance_notes: local research copy provided by project owner}
  - source_key: multimodal_landslide
    enabled: true
    task_roles: [inventory]
    provenance: {source_key: multimodal_landslide, source_name: multimodal-landslide-dataset, source_root: datasets/multimodal-landslide-dataset, source_document: null, citation_key: multimodal_landslide, upstream_url: null, provenance_notes: local research copy provided by project owner}
  - source_key: landslidebench_agent
    enabled: true
    task_roles: [inventory]
    provenance: {source_key: landslidebench_agent, source_name: LandslideBench_agent derived assets, source_root: datasets/LandslideBench_agent, source_document: null, citation_key: landslidebench_agent, upstream_url: null, provenance_notes: local derived research copy provided by project owner}
  - source_key: mmrs_1m
    enabled: true
    task_roles: [inventory]
    provenance: {source_key: mmrs_1m, source_name: MMRS-1M aggregate, source_root: datasets/MMRS-1M, source_document: null, citation_key: mmrs_1m, upstream_url: null, provenance_notes: local research copy provided by project owner}
    language_components:
      - component: rsicd
        component_key: mmrs_1m:rsicd
        task_roles: [language_global]
        split_policy: train_candidate
        provenance: {source_key: 'mmrs_1m:rsicd', source_name: MMRS-1M RSICD captions, source_root: datasets/MMRS-1M, source_document: datasets/MMRS-1M/json/caption/caption_rsicd.json, citation_key: rsicd, upstream_url: null, provenance_notes: local research copy provided by project owner}
      - component: ucm
        component_key: mmrs_1m:ucm
        task_roles: [language_global]
        split_policy: train_candidate
        provenance: {source_key: 'mmrs_1m:ucm', source_name: MMRS-1M UCM captions, source_root: datasets/MMRS-1M, source_document: datasets/MMRS-1M/json/caption/caption_ucm.json, citation_key: ucm_captions, upstream_url: null, provenance_notes: local research copy provided by project owner}
      - component: sydney
        component_key: mmrs_1m:sydney
        task_roles: [language_global]
        split_policy: train_candidate
        provenance: {source_key: 'mmrs_1m:sydney', source_name: MMRS-1M Sydney captions, source_root: datasets/MMRS-1M, source_document: datasets/MMRS-1M/json/caption/caption_syndney.json, citation_key: sydney_captions, upstream_url: null, provenance_notes: local research copy provided by project owner}
      - component: nwpu
        component_key: mmrs_1m:nwpu
        task_roles: [language_global]
        split_policy: train_candidate
        provenance: {source_key: 'mmrs_1m:nwpu', source_name: MMRS-1M NWPU captions, source_root: datasets/MMRS-1M, source_document: datasets/MMRS-1M/json/caption/caption_nwpu.json, citation_key: nwpu_captions, upstream_url: null, provenance_notes: local research copy provided by project owner}
      - component: rsitmd
        component_key: mmrs_1m:rsitmd
        task_roles: [language_global]
        split_policy: train_candidate
        provenance: {source_key: 'mmrs_1m:rsitmd', source_name: MMRS-1M RSITMD captions, source_root: datasets/MMRS-1M, source_document: datasets/MMRS-1M/json/caption/caption_rsitmd.json, citation_key: rsitmd, upstream_url: null, provenance_notes: local research copy provided by project owner}
      - component: dior_rsvg
        component_key: mmrs_1m:dior_rsvg
        task_roles: [language_region]
        split_policy: train_candidate
        provenance: {source_key: 'mmrs_1m:dior_rsvg', source_name: MMRS-1M DIOR-RSVG expressions, source_root: datasets/MMRS-1M, source_document: datasets/MMRS-1M/json/RSVG/rsvg_trainval.json, citation_key: dior_rsvg, upstream_url: null, provenance_notes: local research copy provided by project owner}
  - source_key: rsgpt
    enabled: true
    task_roles: [inventory]
    provenance: {source_key: rsgpt, source_name: RSGPT RSICap and RSIEval, source_root: datasets/RSGPT, source_document: null, citation_key: rsgpt, upstream_url: null, provenance_notes: local research copy provided by project owner}
    language_components:
      - component: rsicap
        component_key: rsgpt:rsicap
        task_roles: [language_global]
        split_policy: train_candidate
        provenance: {source_key: 'rsgpt:rsicap', source_name: RSGPT RSICap captions, source_root: datasets/RSGPT, source_document: datasets/RSGPT/dataset/RSICap/captions.json, citation_key: rsicap, upstream_url: null, provenance_notes: local research copy provided by project owner}
      - component: rsieval
        component_key: rsgpt:rsieval
        task_roles: [language_global]
        split_policy: permanent_test_only
        provenance: {source_key: 'rsgpt:rsieval', source_name: RSGPT RSIEval captions, source_root: datasets/RSGPT, source_document: datasets/RSGPT/dataset/RSIEval/annotations.json, citation_key: rsieval, upstream_url: null, provenance_notes: local research copy provided by project owner}
  - source_key: disasterm3
    enabled: true
    task_roles: [inventory]
    provenance: {source_key: disasterm3, source_name: DisasterM3, source_root: datasets/DisasterM3, source_document: datasets/DisasterM3/README.md, citation_key: disasterm3, upstream_url: null, provenance_notes: local research copy provided by project owner; inventory only because it is outside the frozen single-time model-input scope}
